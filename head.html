<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZUDZSI</title>

    <style>
        body {
            background-color: #E5FCCD;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .title {
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 50px;
            color: #084734;
            font-weight: bold;
            transition: color 0.5s;
        }
    </style>
</head>
<body>

    <div class="title" id="szoveg">SZUDZSI</div>

    <script>
        let isGreen = true;
        const text = document.getElementById("szoveg");

        setInterval(() => {
            if (isGreen) {
                text.style.color = "#CEF17B";
            } else {
                text.style.color = "#084734";
            }
            isGreen = !isGreen;
        }, 2000);
    </script>

</body>
</html>
